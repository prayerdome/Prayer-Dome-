<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prayer Dome | Holy Bible Reader (Enhanced)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --accent-green: #22c55e;
            --accent-gold: #d4af37;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --border-color: #e2e8f0;
            --shadow-lg: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            --hl-yellow: rgba(253, 224, 71, 0.4);
            --hl-green: rgba(74, 222, 128, 0.4);
            --hl-blue: rgba(96, 165, 250, 0.4);
            --hl-pink: rgba(244, 114, 182, 0.4);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); transition: 0.3s; min-height: 100vh; padding-bottom: 140px; }
        body.dark-mode { --bg-primary: #0f172a; --bg-card: #1e293b; --text-primary: #f8fafc; --text-secondary: #cbd5e1; --border-color: #334155; }

        .bible-header { background: linear-gradient(135deg, var(--accent-green), #166534); padding: 15px 25px; color: white; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .header-left { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .header-icon { width: 45px; height: 45px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        .main-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .app-tabs { display: flex; gap: 10px; background: var(--bg-card); padding: 10px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border-color); overflow-x: auto; }
        .app-tab { flex: 1; padding: 12px; border: none; background: transparent; font-weight: 600; cursor: pointer; border-radius: 12px; color: var(--text-secondary); transition: 0.2s; white-space: nowrap; text-align: center; }
        .app-tab.active { background: rgba(34,197,94,0.1); color: var(--accent-green); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .controls-panel { background: var(--bg-card); border-radius: 24px; padding: 20px; margin-bottom: 25px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .version-selector { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); }
        .version-btn { padding: 8px 16px; border-radius: 30px; border: 2px solid var(--border-color); background: var(--bg-primary); color: var(--text-secondary); font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .version-btn.active { background: var(--accent-green); border-color: var(--accent-green); color: white; }

        .nav-controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav-controls select { flex: 1; min-width: 120px; padding: 12px; border-radius: 12px; border: 2px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); font-weight: 600; outline: none; }
        .btn-read { background: var(--accent-gold); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }

        .bible-reader { background: var(--bg-card); border-radius: 32px; padding: 40px; box-shadow: var(--shadow-lg); border: 1px solid var(--border-color); font-family: 'Merriweather', serif; font-size: 1.2rem; line-height: 2.2; }
        .chapter-title { text-align: center; font-size: 2rem; color: var(--accent-green); margin-bottom: 30px; border-bottom: 2px solid var(--accent-gold); display: block; width: fit-content; margin-left: auto; margin-right: auto; padding-bottom: 10px; }

        .verse-item { display: inline; padding: 2px 4px; border-radius: 6px; cursor: pointer; transition: 0.2s; position: relative; }
        .verse-item:hover { background: rgba(34,197,94,0.1); }
        .verse-item.selected { border-bottom: 2px dashed var(--accent-gold); }
        .verse-item.reading { background: rgba(34,197,94,0.2); color: var(--accent-green); font-weight: bold; }
        .verse-num { font-size: 0.75rem; font-weight: 700; color: var(--accent-gold); vertical-align: super; margin-right: 5px; font-family: 'Inter', sans-serif; }

        /* Actions & Player */
        .action-bar { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 10px 20px; border-radius: 40px; display: none; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1000; align-items: center; }
        .audio-player { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-card); border-top: 1px solid var(--border-color); padding: 15px 25px; display: none; justify-content: space-between; align-items: center; z-index: 999; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        
        /* Notebook */
        .notebook-item { background: var(--bg-card); border-radius: 16px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border-color); border-left: 5px solid var(--accent-gold); }
        
        .loading-spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: var(--accent-green); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2500; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg-card); border-radius: 24px; padding: 25px; width: 90%; max-width: 500px; }

        /* Highlights */
        .hl-yellow { background-color: var(--hl-yellow); }
        .hl-green { background-color: var(--hl-green); }
        .hl-blue { background-color: var(--hl-blue); }
        .hl-pink { background-color: var(--hl-pink); }
    </style>
</head>
<body>

    <header class="bible-header">
        <div class="header-left" onclick="window.location.href='index.html'">
            <div class="header-icon"><i class="fas fa-bible"></i></div>
            <div class="header-title">
                <h1>Prayer Dome Bible</h1>
                <p>NIV • MSG • NLT • ESV • KJV</p>
            </div>
        </div>
        <button onclick="toggleDarkMode()" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:10px; border-radius:50%; cursor:pointer;"><i class="fas fa-moon"></i></button>
    </header>

    <div class="main-container">
        <div class="app-tabs">
            <button class="app-tab active" onclick="switchTab('read')"><i class="fas fa-book-open"></i> Read</button>
            <button class="app-tab" onclick="switchTab('notebook')"><i class="fas fa-bookmark"></i> Notebook</button>
            <button class="app-tab" onclick="switchTab('search')"><i class="fas fa-search"></i> Search</button>
        </div>

        <!-- READ TAB -->
        <div id="tab-read" class="tab-content active">
            <div class="controls-panel">
                <div class="version-selector">
                    <button class="version-btn active" onclick="setVersion('NIV')">NIV</button>
                    <button class="version-btn" onclick="setVersion('MSG')">MSG</button>
                    <button class="version-btn" onclick="setVersion('NLT')">NLT</button>
                    <button class="version-btn" onclick="setVersion('ESV')">ESV</button>
                    <button class="version-btn" onclick="setVersion('KJV')">KJV</button>
                    <button class="version-btn" onclick="setVersion('WEB')">WEB</button>
                </div>
                <div class="nav-controls">
                    <select id="bookSelect" onchange="updateChapters()"></select>
                    <select id="chapterSelect"></select>
                    <button class="btn-read" onclick="fetchChapter()">READ</button>
                </div>
            </div>

            <div class="bible-reader" id="bibleReader">
                <div style="text-align:center; padding:50px 0; opacity:0.6;">
                    <i class="fas fa-book-reader fa-4x"></i>
                    <h3 style="margin-top:20px;">Select a Chapter to Begin</h3>
                </div>
            </div>
        </div>

        <!-- NOTEBOOK TAB -->
        <div id="tab-notebook" class="tab-content">
            <div id="notebookList"></div>
        </div>

        <!-- SEARCH TAB -->
        <div id="tab-search" class="tab-content">
            <div class="controls-panel">
                <input type="text" id="searchInput" placeholder="Search scriptures..." style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border-color);">
                <button class="btn-read" style="width:100%; margin-top:10px;" onclick="searchBible()">Search</button>
            </div>
            <div id="searchResults"></div>
        </div>
    </div>

    <!-- Floating Selection Menu -->
    <div class="action-bar" id="actionBar">
        <button onclick="copyVerse()" style="background:none; border:none; color:white; cursor:pointer;"><i class="fas fa-copy"></i></button>
        <button onclick="saveFavorite()" style="background:none; border:none; color:white; cursor:pointer;"><i class="fas fa-heart"></i></button>
        <button onclick="openNoteModal()" style="background:none; border:none; color:white; cursor:pointer;"><i class="fas fa-edit"></i></button>
        <div style="display:flex; gap:5px; border-left:1px solid #444; padding-left:10px;">
            <div class="hl-yellow" style="width:20px; height:20px; border-radius:50%;" onclick="highlight('hl-yellow')"></div>
            <div class="hl-green" style="width:20px; height:20px; border-radius:50%;" onclick="highlight('hl-green')"></div>
            <div class="hl-blue" style="width:20px; height:20px; border-radius:50%;" onclick="highlight('hl-blue')"></div>
        </div>
    </div>

    <!-- Audio Player -->
    <div class="audio-player" id="audioPlayer">
        <div style="display:flex; align-items:center; gap:10px;">
            <i class="fas fa-headphones" style="color:var(--accent-green);"></i>
            <div>
                <b id="audioRef">John 1</b>
                <p style="font-size:10px; opacity:0.6;" id="audioVer">NIV Version</p>
            </div>
        </div>
        <div style="display:flex; gap:20px; align-items:center;">
            <button onclick="audioSkip(-1)" style="background:none; border:none; font-size:1.2rem; cursor:pointer;"><i class="fas fa-step-backward"></i></button>
            <button onclick="toggleAudio()" id="playBtn" style="width:50px; height:50px; background:var(--accent-green); color:white; border:none; border-radius:50%; font-size:1.5rem; cursor:pointer;"><i class="fas fa-play"></i></button>
            <button onclick="audioSkip(1)" style="background:none; border:none; font-size:1.2rem; cursor:pointer;"><i class="fas fa-step-forward"></i></button>
        </div>
        <select id="audioSpeed" style="padding:5px; border-radius:8px; background:var(--bg-primary);">
            <option value="1">1x Speed</option>
            <option value="1.2">1.2x</option>
            <option value="1.5">1.5x</option>
        </select>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCxvql0r_aeerphxTA0UUedRppdBxGf7wo", authDomain: "prayer-dome.firebaseapp.com", projectId: "prayer-dome", storageBucket: "prayer-dome.firebasestorage.app", messagingSenderId: "198295153196", appId: "1:198295153196:web:1222b31948d7974ba3bf89" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUser = null;

        onAuthStateChanged(auth, user => { currentUser = user; if(user) loadUserData(); });

        const bibleBooks = [
            {name:"Genesis", ch:50}, {name:"Exodus", ch:40}, {name:"Leviticus", ch:27}, {name:"Numbers", ch:36}, {name:"Deuteronomy", ch:34},
            {name:"Joshua", ch:24}, {name:"Judges", ch:21}, {name:"Ruth", ch:4}, {name:"1 Samuel", ch:31}, {name:"2 Samuel", ch:24},
            {name:"1 Kings", ch:22}, {name:"2 Kings", ch:25}, {name:"1 Chronicles", ch:29}, {name:"2 Chronicles", ch:36}, {name:"Ezra", ch:10},
            {name:"Nehemiah", ch:13}, {name:"Esther", ch:10}, {name:"Job", ch:42}, {name:"Psalms", ch:150}, {name:"Proverbs", ch:31},
            {name:"Ecclesiastes", ch:12}, {name:"Song of Solomon", ch:8}, {name:"Isaiah", ch:66}, {name:"Jeremiah", ch:52}, {name:"Lamentations", ch:5},
            {name:"Ezekiel", ch:48}, {name:"Daniel", ch:12}, {name:"Hosea", ch:14}, {name:"Joel", ch:3}, {name:"Amos", ch:9},
            {name:"Obadiah", ch:1}, {name:"Jonah", ch:4}, {name:"Micah", ch:7}, {name:"Nahum", ch:3}, {name:"Habakkuk", ch:3},
            {name:"Zephaniah", ch:3}, {name:"Haggai", ch:2}, {name:"Zechariah", ch:14}, {name:"Malachi", ch:4},
            {name:"Matthew", ch:28}, {name:"Mark", ch:16}, {name:"Luke", ch:24}, {name:"John", ch:21}, {name:"Acts", ch:28},
            {name:"Romans", ch:16}, {name:"1 Corinthians", ch:16}, {name:"2 Corinthians", ch:13}, {name:"Galatians", ch:6}, {name:"Ephesians", ch:6},
            {name:"Philippians", ch:4}, {name:"Colossians", ch:4}, {name:"1 Thessalonians", ch:5}, {name:"2 Thessalonians", ch:3}, {name:"1 Timothy", ch:6},
            {name:"2 Timothy", ch:4}, {name:"Titus", ch:3}, {name:"Philemon", ch:1}, {name:"Hebrews", ch:13}, {name:"James", ch:5},
            {name:"1 Peter", ch:5}, {name:"2 Peter", ch:3}, {name:"1 John", ch:5}, {name:"2 John", ch:1}, {name:"3 John", ch:1},
            {name:"Jude", ch:1}, {name:"Revelation", ch:22}
        ];

        let currentVersion = 'NIV';
        let currentVerses = [];
        let selectedVerseIdx = null;
        let bibleCache = {}; // FAST LOADING CACHE

        function init() {
            const bSel = document.getElementById('bookSelect');
            bibleBooks.forEach((b, i) => bSel.innerHTML += `<option value="${i}">${b.name}</option>`);
            updateChapters();
        }

        window.updateChapters = () => {
            const bIdx = document.getElementById('bookSelect').value;
            const cSel = document.getElementById('chapterSelect');
            cSel.innerHTML = "";
            for(let i=1; i<=bibleBooks[bIdx].ch; i++) cSel.innerHTML += `<option value="${i}">Chapter ${i}</option>`;
        };

        window.setVersion = (v) => {
            currentVersion = v;
            document.querySelectorAll('.version-btn').forEach(b => b.classList.toggle('active', b.innerText === v));
            if(currentVerses.length > 0) fetchChapter();
        };

        window.fetchChapter = async () => {
            const bIdx = parseInt(document.getElementById('bookSelect').value);
            const bookId = bIdx + 1;
            const bookName = bibleBooks[bIdx].name;
            const ch = document.getElementById('chapterSelect').value;
            const reader = document.getElementById('bibleReader');
            const cacheKey = `${currentVersion}-${bookId}-${ch}`;

            reader.innerHTML = '<div class="loading-spinner"></div>';
            
            // Speed Check: Cache
            if(bibleCache[cacheKey]) {
                currentVerses = bibleCache[cacheKey];
                render(bookName, ch);
                return;
            }

            try {
                let data = [];
                // Bolls Life API (Supports NIV, MSG, NLT, ESV, KJV)
                if(['NIV', 'MSG', 'NLT', 'ESV', 'KJV'].includes(currentVersion)) {
                    const res = await fetch(`https://bolls.life/get-chapter/${currentVersion}/${bookId}/${ch}/`);
                    data = await res.json();
                } else {
                    // Fallback to Bible-API
                    const res = await fetch(`https://bible-api.com/${bookName}+${ch}?translation=web`);
                    const json = await res.json();
                    data = json.verses;
                }

                currentVerses = data.map(v => ({ verse: v.verse, text: v.text.replace(/<(?:.|\n)*?>/gm, '') }));
                bibleCache[cacheKey] = currentVerses;
                render(bookName, ch);

                document.getElementById('audioRef').innerText = `${bookName} ${ch}`;
                document.getElementById('audioPlayer').style.display = 'flex';

            } catch (e) {
                reader.innerHTML = "<p style='text-align:center; padding:20px;'>Error loading chapter. Please check internet connection.</p>";
            }
        };

        function render(book, ch) {
            let html = `<div class="chapter-title">${book} ${ch}</div><div class="verses-container">`;
            currentVerses.forEach((v, i) => {
                html += `<span class="verse-item" id="v-${i}" onclick="selVerse(${i})"><span class="verse-num">${v.verse}</span>${v.text}</span> `;
            });
            html += "</div>";
            document.getElementById('bibleReader').innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.selVerse = (i) => {
            selectedVerseIdx = i;
            document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('selected'));
            document.getElementById(`v-${i}`).classList.add('selected');
            document.getElementById('actionBar').style.display = 'flex';
        };

        // --- AUDIO ENGINE ---
        let speech = window.speechSynthesis;
        let isReading = false;
        let readIdx = 0;

        window.toggleAudio = () => {
            if(isReading) { speech.pause(); isReading = false; }
            else { 
                if(speech.paused) speech.resume(); 
                else { readIdx = selectedVerseIdx || 0; playAudio(); }
                isReading = true;
            }
            document.getElementById('playBtn').innerHTML = isReading ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
        };

        function playAudio() {
            if(readIdx >= currentVerses.length) { stopAudio(); return; }
            speech.cancel();
            
            const utter = new SpeechSynthesisUtterance(currentVerses[readIdx].text);
            utter.rate = document.getElementById('audioSpeed').value;
            
            document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('reading'));
            const el = document.getElementById(`v-${readIdx}`);
            el.classList.add('reading');
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });

            utter.onend = () => { readIdx++; if(isReading) playAudio(); };
            speech.speak(utter);
        }

        function stopAudio() { speech.cancel(); isReading = false; document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>'; }

        // --- UI HELPERS ---
        window.switchTab = (t) => {
            document.querySelectorAll('.app-tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${t}`).classList.add('active');
        };

        window.toggleDarkMode = () => document.body.classList.toggle('dark-mode');

        window.copyVerse = () => {
            const v = currentVerses[selectedVerseIdx];
            navigator.clipboard.writeText(v.text);
            alert("Verse copied!");
            document.getElementById('actionBar').style.display = 'none';
        };

        init();
    </script>
</body>
</html>
