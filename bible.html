<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prayer Dome | Holy Bible Reader (Enhanced)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --accent-green: #22c55e;
            --accent-gold: #d4af37;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --border-color: #e2e8f0;
            --shadow-lg: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            --hl-yellow: rgba(253, 224, 71, 0.4);
            --hl-green: rgba(74, 222, 128, 0.4);
            --hl-blue: rgba(96, 165, 250, 0.4);
            --hl-pink: rgba(244, 114, 182, 0.4);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); transition: 0.3s; min-height: 100vh; padding-bottom: 140px; overflow-x: hidden; }
        body.dark-mode { --bg-primary: #0f172a; --bg-card: #1e293b; --text-primary: #f8fafc; --text-secondary: #cbd5e1; --border-color: #334155; 
            --hl-yellow: rgba(253, 224, 71, 0.25);
            --hl-green: rgba(74, 222, 128, 0.25);
            --hl-blue: rgba(96, 165, 250, 0.25);
            --hl-pink: rgba(244, 114, 182, 0.25);
        }

        /* HEADER */
        .bible-header { background: linear-gradient(135deg, var(--accent-green), #166534); padding: 15px 25px; color: white; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);}
        .header-left { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; color: white;}
        .header-icon { width: 45px; height: 45px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .header-title h1 { font-size: 1.3rem; font-weight: 800; line-height: 1.2; }
        .header-title p { font-size: 0.75rem; opacity: 0.9; display: flex; align-items: center; gap: 5px;}
        .offline-badge { background: #ef4444; color: white; padding: 2px 6px; border-radius: 10px; font-size: 9px; font-weight: bold; display: none; }

        .main-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* TABS */
        .app-tabs { display: flex; gap: 10px; background: var(--bg-card); padding: 10px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border-color); overflow-x: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.03);}
        .app-tab { flex: 1; padding: 12px; border: none; background: transparent; font-weight: 600; cursor: pointer; border-radius: 12px; color: var(--text-secondary); transition: 0.2s; white-space: nowrap; text-align: center; }
        .app-tab.active { background: rgba(34,197,94,0.1); color: var(--accent-green); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }

        /* CONTROLS */
        .controls-panel { background: var(--bg-card); border-radius: 24px; padding: 20px; margin-bottom: 25px; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .version-selector { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); }
        .version-btn { padding: 8px 16px; border-radius: 30px; border: 2px solid var(--border-color); background: var(--bg-primary); color: var(--text-secondary); font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .version-btn.active { background: var(--accent-green); border-color: var(--accent-green); color: white; }

        .nav-controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav-controls select { flex: 1; min-width: 120px; padding: 12px 15px; border-radius: 12px; border: 2px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); font-weight: 600; outline: none; font-size: 1rem;}
        .nav-controls select:focus { border-color: var(--accent-green); }
        .btn-read { background: var(--accent-gold); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; justify-content: center;}
        .btn-read:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,175,55,0.4); }

        /* BIBLE TEXT */
        .bible-reader { background: var(--bg-card); border-radius: 32px; padding: 40px 50px; box-shadow: var(--shadow-lg); border: 1px solid var(--border-color); font-family: 'Merriweather', serif; font-size: 1.2rem; line-height: 2.2; }
        .chapter-title { text-align: center; font-size: 2rem; color: var(--accent-green); margin-bottom: 30px; border-bottom: 2px solid var(--accent-gold); display: block; width: fit-content; margin-left: auto; margin-right: auto; padding-bottom: 10px; font-weight: 800;}

        .verses-container { font-family: 'Merriweather', serif; font-size: 1.15rem; line-height: 2; color: var(--text-primary); }

        .verse-item { display: inline; padding: 2px 4px; border-radius: 6px; cursor: pointer; transition: all 0.2s; position: relative; }
        .verse-item:hover { background: rgba(34,197,94,0.1); }
        .verse-item.selected { border-bottom: 2px dashed var(--accent-gold); }
        .verse-item.reading { background: rgba(34,197,94,0.2); color: var(--accent-green); font-weight: bold; border-radius: 8px; padding: 4px; box-shadow: 0 2px 10px rgba(34,197,94,0.2);}
        
        .verse-num { font-size: 0.75rem; font-weight: 700; color: var(--accent-gold); vertical-align: super; margin-right: 4px; font-family: 'Inter', sans-serif; user-select: none;}
        
        .verse-has-note::after { content: '📝'; font-size: 0.8rem; vertical-align: super; margin-left: 4px; }
        .hl-yellow { background-color: var(--hl-yellow); }
        .hl-green { background-color: var(--hl-green); }
        .hl-blue { background-color: var(--hl-blue); }
        .hl-pink { background-color: var(--hl-pink); }

        /* FLOATING ACTION BAR */
        .action-bar { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(20px); background: #0f172a; color: white; padding: 10px 25px; border-radius: 40px; display: flex; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); opacity: 0; visibility: hidden; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; align-items: center; width: max-content; max-width: 95%; flex-wrap: wrap; justify-content: center;}
        .action-bar.visible { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        
        .action-btn { background: none; border: none; color: white; font-size: 1.1rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.2s; opacity: 0.9;}
        .action-btn:hover { color: var(--accent-green); opacity: 1; transform: translateY(-2px);}
        .action-btn span { font-size: 0.65rem; font-family: 'Inter', sans-serif; font-weight: 600;}
        
        .color-picker { display: flex; gap: 8px; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 15px; margin-left: 5px;}
        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; transition: 0.2s; border: 2px solid white;}
        .color-dot:hover { transform: scale(1.2); }

        /* PROFESSIONAL AUDIO PLAYER */
        .audio-player { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-card); border-top: 1px solid var(--border-color); padding: 15px 30px; display: none; justify-content: space-between; align-items: center; z-index: 999; box-shadow: 0 -5px 25px rgba(0,0,0,0.05); }
        .audio-info { display: flex; align-items: center; gap: 15px; }
        .audio-icon { width: 45px; height: 45px; background: linear-gradient(135deg, var(--accent-green), #16a34a); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px;}
        .audio-controls { display: flex; gap: 20px; align-items: center; }
        .audio-btn { background: none; border: none; color: var(--text-primary); font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .audio-btn.play { width: 50px; height: 50px; background: var(--accent-green); color: white; border-radius: 50%; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(34,197,94,0.3); }
        .audio-btn.play:hover { transform: scale(1.05); }
        .player-settings select { background: var(--bg-primary); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 12px; color: var(--text-primary); font-size: 0.85rem; cursor: pointer; font-weight: 500; outline: none; max-width: 140px;}

        /* NOTEBOOK & SEARCH */
        .notebook-grid { display: grid; gap: 15px; }
        .notebook-item { background: var(--bg-card); border-radius: 16px; padding: 20px; border: 1px solid var(--border-color); border-left: 5px solid var(--accent-gold); display: flex; justify-content: space-between; align-items: flex-start; box-shadow: 0 4px 10px rgba(0,0,0,0.02);}
        .notebook-content h4 { color: var(--accent-green); margin-bottom: 8px; font-size: 1.1rem; cursor: pointer; font-family: 'Inter', sans-serif; display: inline-flex; align-items: center; gap: 8px;}
        .notebook-content h4:hover { text-decoration: underline; }
        .notebook-content p { font-style: italic; color: var(--text-main); margin-bottom: 8px; font-family: 'Merriweather', serif;}
        .note-block { background: var(--bg-primary); padding: 12px; border-radius: 8px; font-size: 0.9rem; font-family: 'Inter', sans-serif; color: var(--text-secondary); margin-top: 10px; border: 1px solid var(--border-color);}
        
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 14px 20px; border-radius: 15px; border: 2px solid var(--border-color); font-size: 1rem; background: var(--bg-primary); color: var(--text-primary); outline: none;}
        .search-box input:focus { border-color: var(--accent-green); }

        /* MODALS */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2500; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg-card); border-radius: 24px; padding: 30px; width: 90%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: modalPop 0.3s ease;}
        @keyframes modalPop { from { transform: scale(0.9); opacity: 0;} to { transform: scale(1); opacity: 1;} }
        
        #verseCanvas { width: 100%; border-radius: 12px; box-shadow: var(--shadow-lg); margin: 15px 0; max-width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto;}
        
        .btn-modern { padding: 12px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; border: none; background: linear-gradient(135deg, var(--accent-green), #16a34a); color: white; transition: 0.3s; display: inline-flex; gap: 8px; align-items: center; justify-content: center;}
        .btn-modern:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(34,197,94,0.4); }

        /* TOAST & SPINNER */
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 10px;}
        .toast { background: var(--bg-card); padding: 15px 25px; border-radius: 40px; box-shadow: var(--shadow-lg); border-left: 4px solid var(--accent-green); display: flex; align-items: center; gap: 10px; font-weight: 500; animation: slideIn 0.3s ease; color: var(--text-main);}
        .toast.error { border-left-color: var(--accent-red); }
        .toast.info { border-left-color: var(--accent-blue); }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        .loading-spinner { width: 40px; height: 40px; border: 4px solid var(--border-color); border-top-color: var(--accent-green); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .bible-reader { padding: 25px 20px; }
            .chapter-title { font-size: 1.8rem; }
            .verses-container { font-size: 1.1rem; }
            .audio-player { flex-direction: column; gap: 15px; padding: 15px; }
            .action-bar { bottom: 130px; width: 95%; justify-content: center; padding: 10px; flex-wrap: wrap;}
            .color-picker { display: none; } /* Hide colors on mobile to save space */
        }
    </style>
</head>
<body>

    <header class="bible-header">
        <a href="index.html" class="header-left">
            <div class="header-icon"><i class="fas fa-bible"></i></div>
            <div class="header-title">
                <h1>Prayer Dome Bible</h1>
                <p>Read, Listen, Highlight & Share <span class="offline-badge" id="offlineBadge">OFFLINE</span></p>
            </div>
        </a>
        <div style="display: flex; gap: 10px;">
            <button onclick="toggleDarkMode()" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:10px 12px; border-radius:50%; cursor:pointer; transition:0.3s;"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <div class="toast-container" id="toastContainer"></div>

    <div class="main-container">
        <!-- TABS -->
        <div class="app-tabs">
            <button class="app-tab active" onclick="switchTab('read')"><i class="fas fa-book-open"></i> Read</button>
            <button class="app-tab" onclick="switchTab('notebook')"><i class="fas fa-bookmark"></i> My Notebook</button>
            <button class="app-tab" onclick="switchTab('search')"><i class="fas fa-search"></i> Search</button>
        </div>

        <!-- READ TAB -->
        <div id="tab-read" class="tab-content active">
            <div class="controls-panel">
                <div class="version-selector">
                    <button class="version-btn active" onclick="setVersion('NIV')">NIV</button>
                    <button class="version-btn" onclick="setVersion('MSG')">MSG</button>
                    <button class="version-btn" onclick="setVersion('NLT')">NLT</button>
                    <button class="version-btn" onclick="setVersion('ESV')">ESV</button>
                    <button class="version-btn" onclick="setVersion('KJV')">KJV</button>
                    <button class="version-btn" onclick="setVersion('WEB')">WEB</button>
                </div>
                <div class="nav-controls">
                    <select id="bookSelect" onchange="updateChapters()"></select>
                    <select id="chapterSelect"></select>
                    <button class="btn-read" onclick="fetchChapter()"><i class="fas fa-book-reader"></i> READ</button>
                </div>
            </div>

            <div class="bible-reader" id="bibleReader">
                <div style="text-align:center; padding:50px 0; opacity:0.6;">
                    <i class="fas fa-book-open fa-4x" style="color: var(--accent-gold); margin-bottom: 20px;"></i>
                    <h3 style="margin-top:20px;">Loading the Word...</h3>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; margin-top: 25px;">
                <button class="btn-modern" style="background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color);" onclick="navigateChapter(-1)"><i class="fas fa-arrow-left"></i> Previous</button>
                <button class="btn-modern" style="background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color);" onclick="navigateChapter(1)">Next <i class="fas fa-arrow-right"></i></button>
            </div>
        </div>

        <!-- NOTEBOOK TAB -->
        <div id="tab-notebook" class="tab-content">
            <div class="controls-panel" style="flex-direction: row; justify-content: center; gap: 10px; background: transparent; border: none; box-shadow: none; padding: 0;">
                <button class="version-btn active" id="nb-hl-btn" onclick="showNotebookSection('highlights')">Highlights</button>
                <button class="version-btn" id="nb-nt-btn" onclick="showNotebookSection('notes')">Notes</button>
                <button class="version-btn" id="nb-fv-btn" onclick="showNotebookSection('favorites')">Favorites</button>
            </div>
            <div id="notebookList" class="notebook-grid">
                <div style="text-align: center; padding: 40px;"><div class="loading-spinner"></div></div>
            </div>
        </div>

        <!-- SEARCH TAB -->
        <div id="tab-search" class="tab-content">
            <div class="controls-panel">
                <h3 style="color: var(--accent-green); margin-bottom: 10px;"><i class="fas fa-search"></i> Search the Scriptures</h3>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search for a word, phrase, or reference..." onkeypress="if(event.key === 'Enter') searchBible()">
                    <button class="btn-read" onclick="searchBible()">Search</button>
                </div>
            </div>
            <div id="searchResults" class="notebook-grid"></div>
        </div>
    </div>

    <!-- FLOATING ACTION BAR -->
    <div class="action-bar" id="actionBar">
        <button class="action-btn" onclick="startAudioFromSelected()"><i class="fas fa-volume-up"></i><span>Listen</span></button>
        <button class="action-btn" onclick="copyVerse()"><i class="fas fa-copy"></i><span>Copy</span></button>
        <button class="action-btn" onclick="saveFavorite()"><i class="fas fa-heart"></i><span>Favorite</span></button>
        <button class="action-btn" onclick="openNoteModal()"><i class="fas fa-edit"></i><span>Note</span></button>
        <button class="action-btn" onclick="openCanvasModal()"><i class="fas fa-image"></i><span>Image</span></button>
        
        <div class="color-picker">
            <div class="color-dot" style="background: #fde047;" onclick="highlight('hl-yellow')"></div>
            <div class="color-dot" style="background: #4ade80;" onclick="highlight('hl-green')"></div>
            <div class="color-dot" style="background: #60a5fa;" onclick="highlight('hl-blue')"></div>
            <div class="color-dot" style="background: #f472b6;" onclick="highlight('hl-pink')"></div>
            <div class="color-dot" style="background: transparent; border-color: #94a3b8; display:flex; align-items:center; justify-content:center; color: #94a3b8; font-size: 10px;" onclick="removeHighlight()"><i class="fas fa-times"></i></div>
        </div>
    </div>

    <!-- AUDIO PLAYER -->
    <div class="audio-player" id="audioPlayer">
        <div class="audio-info">
            <div class="audio-icon"><i class="fas fa-headphones"></i></div>
            <div>
                <b id="audioRef" style="font-size: 1.1rem; color: var(--text-primary);">John 1</b>
                <p style="font-size: 0.8rem; color: var(--text-secondary);" id="audioVer">NIV Version</p>
            </div>
        </div>
        <div class="audio-controls">
            <button class="audio-btn" onclick="audioSkip(-1)"><i class="fas fa-step-backward"></i></button>
            <button class="audio-btn play" onclick="toggleAudio()" id="playBtn"><i class="fas fa-play"></i></button>
            <button class="audio-btn" onclick="audioSkip(1)"><i class="fas fa-step-forward"></i></button>
            <button class="audio-btn" onclick="stopAudio()"><i class="fas fa-square" style="font-size: 1rem;"></i></button>
        </div>
        <div style="display: flex; gap: 10px;">
            <select id="voiceSelect" style="padding:5px 10px; border-radius:8px; background:var(--bg-primary); border:1px solid var(--border-color); color:var(--text-primary); outline:none; max-width: 140px;"></select>
            <select id="audioSpeed" style="padding:5px 10px; border-radius:8px; background:var(--bg-primary); border:1px solid var(--border-color); color:var(--text-primary); outline:none;">
                <option value="0.8">0.8x</option>
                <option value="1" selected>1.0x Normal</option>
                <option value="1.2">1.2x</option>
                <option value="1.5">1.5x</option>
            </select>
        </div>
    </div>

    <!-- MODALS -->
    <!-- Note Modal -->
    <div class="modal" id="noteModal">
        <div class="modal-content">
            <h2 style="color: var(--accent-green); margin-bottom: 10px;"><i class="fas fa-edit"></i> Add Personal Note</h2>
            <p id="noteReference" style="font-weight: 700; margin-bottom: 5px; color: var(--accent-gold);"></p>
            <p id="noteVerseText" style="font-style: italic; color: var(--text-secondary); margin-bottom: 15px; font-size: 0.95rem;"></p>
            
            <textarea id="noteInput" style="width: 100%; height: 120px; padding: 15px; border-radius: 12px; border: 2px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); font-family: inherit; resize: vertical; outline:none;" placeholder="Write your insights, prayers, or thoughts..."></textarea>
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-modern" style="flex: 1;" onclick="saveNote()"><i class="fas fa-save"></i> Save Note</button>
                <button class="btn-modern" style="flex: 1; background: var(--bg-primary); color: var(--text-primary); border: 2px solid var(--border-color);" onclick="document.getElementById('noteModal').style.display='none'">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Verse Image Generator Modal -->
    <div class="modal" id="canvasModal">
        <div class="modal-content" style="text-align: center;">
            <h2 style="color: var(--accent-green); margin-bottom: 5px;"><i class="fas fa-paint-brush"></i> Verse Image</h2>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 15px;">Generate beautiful scripture art to share.</p>
            
            <canvas id="verseCanvas" width="800" height="800"></canvas>
            
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
                <button class="btn-modern" style="flex: 1; background: var(--accent-gold);" onclick="changeCanvasBackground()"><i class="fas fa-random"></i> Change BG</button>
                <button class="btn-modern" style="flex: 2;" onclick="uploadToCloudinary()" id="uploadImgBtn"><i class="fas fa-share-alt"></i> Share & Save</button>
            </div>
            <button class="btn-modern" style="background: transparent; color: var(--text-secondary); width: 100%; margin-top: 10px;" onclick="document.getElementById('canvasModal').style.display='none'">Cancel</button>
        </div>
    </div>

    <!-- Firebase & Logic Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, query, where, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCxvql0r_aeerphxTA0UUedRppdBxGf7wo", authDomain: "prayer-dome.firebaseapp.com", projectId: "prayer-dome", storageBucket: "prayer-dome.firebasestorage.app", messagingSenderId: "198295153196", appId: "1:198295153196:web:1222b31948d7974ba3bf89" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUser = null;

        // User Data State
        let myHighlights = JSON.parse(localStorage.getItem('pd_highlights')) || {}; 
        let myNotes = JSON.parse(localStorage.getItem('pd_notes')) || {};      
        let myFavorites = JSON.parse(localStorage.getItem('pd_favorites')) || {};  
        let bibleCache = JSON.parse(localStorage.getItem('pd_bible_cache')) || {}; 

        // Network Listener
        window.addEventListener('offline', () => {
            document.getElementById('offlineBadge').style.display = 'inline-block';
            showToast('You are offline. Showing saved data.', 'info');
        });
        window.addEventListener('online', () => {
            document.getElementById('offlineBadge').style.display = 'none';
            if(currentUser) loadUserData(); // Sync data
        });

        if(!navigator.onLine) document.getElementById('offlineBadge').style.display = 'inline-block';

        // Wait for DOM
        document.addEventListener('DOMContentLoaded', () => {
            initBible();
            
            onAuthStateChanged(auth, async (user) => { 
                currentUser = user; 
                if(user && navigator.onLine) {
                    await loadUserData();
                } else if (!user) {
                    showToast('Sign in to backup your highlights and notes.', 'info');
                }
            });
        });

        // --- BIBLE DATA (Full 66 Books) ---
        const bibleBooks =[
            {name:"Genesis", ch:50}, {name:"Exodus", ch:40}, {name:"Leviticus", ch:27}, {name:"Numbers", ch:36}, {name:"Deuteronomy", ch:34},
            {name:"Joshua", ch:24}, {name:"Judges", ch:21}, {name:"Ruth", ch:4}, {name:"1 Samuel", ch:31}, {name:"2 Samuel", ch:24},
            {name:"1 Kings", ch:22}, {name:"2 Kings", ch:25}, {name:"1 Chronicles", ch:29}, {name:"2 Chronicles", ch:36}, {name:"Ezra", ch:10},
            {name:"Nehemiah", ch:13}, {name:"Esther", ch:10}, {name:"Job", ch:42}, {name:"Psalms", ch:150}, {name:"Proverbs", ch:31},
            {name:"Ecclesiastes", ch:12}, {name:"Song of Solomon", ch:8}, {name:"Isaiah", ch:66}, {name:"Jeremiah", ch:52}, {name:"Lamentations", ch:5},
            {name:"Ezekiel", ch:48}, {name:"Daniel", ch:12}, {name:"Hosea", ch:14}, {name:"Joel", ch:3}, {name:"Amos", ch:9},
            {name:"Obadiah", ch:1}, {name:"Jonah", ch:4}, {name:"Micah", ch:7}, {name:"Nahum", ch:3}, {name:"Habakkuk", ch:3},
            {name:"Zephaniah", ch:3}, {name:"Haggai", ch:2}, {name:"Zechariah", ch:14}, {name:"Malachi", ch:4},
            {name:"Matthew", ch:28}, {name:"Mark", ch:16}, {name:"Luke", ch:24}, {name:"John", ch:21}, {name:"Acts", ch:28},
            {name:"Romans", ch:16}, {name:"1 Corinthians", ch:16}, {name:"2 Corinthians", ch:13}, {name:"Galatians", ch:6}, {name:"Ephesians", ch:6},
            {name:"Philippians", ch:4}, {name:"Colossians", ch:4}, {name:"1 Thessalonians", ch:5}, {name:"2 Thessalonians", ch:3}, {name:"1 Timothy", ch:6},
            {name:"2 Timothy", ch:4}, {name:"Titus", ch:3}, {name:"Philemon", ch:1}, {name:"Hebrews", ch:13}, {name:"James", ch:5},
            {name:"1 Peter", ch:5}, {name:"2 Peter", ch:3}, {name:"1 John", ch:5}, {name:"2 John", ch:1}, {name:"3 John", ch:1},
            {name:"Jude", ch:1}, {name:"Revelation", ch:22}
        ];

        let currentVersion = 'NIV';
        let currentVerses =[];
        let selectedVerseIdx = null;

        // --- INITIALIZATION ---
        function initBible() {
            const bSel = document.getElementById('bookSelect');
            bSel.innerHTML = '';
            bibleBooks.forEach((b, idx) => {
                bSel.innerHTML += `<option value="${idx}">${b.name}</option>`;
            });
            window.updateChapters();
            initVoices();
            
            // Auto load Genesis 1
            setTimeout(() => { window.fetchChapter(); }, 100);
        }

        window.updateChapters = () => {
            const bIdx = document.getElementById('bookSelect').value;
            const chapters = bibleBooks[bIdx].ch;
            const cSel = document.getElementById('chapterSelect');
            cSel.innerHTML = "";
            for(let i=1; i<=chapters; i++) {
                cSel.innerHTML += `<option value="${i}">Chapter ${i}</option>`;
            }
        };

        window.setVersion = (v) => {
            currentVersion = v;
            document.querySelectorAll('.version-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if(currentVerses.length > 0) window.fetchChapter();
        };

        // --- FETCH CHAPTER LOGIC (With Robust Offline Caching) ---
        window.fetchChapter = async () => {
            const bIdx = parseInt(document.getElementById('bookSelect').value);
            const bookId = bIdx + 1; // Bolls API is 1-indexed
            const bookName = bibleBooks[bIdx].name;
            const ch = document.getElementById('chapterSelect').value;
            const reader = document.getElementById('bibleReader');
            const cacheKey = `${currentVersion}-${bookId}-${ch}`;

            reader.innerHTML = '<div class="loading-spinner"></div><p style="text-align:center; color: var(--text-secondary);">Opening Scriptures...</p>';
            stopAudio();
            document.getElementById('actionBar').classList.remove('visible');

            // 1. Check Offline / Local Cache First for instant loading
            if(bibleCache[cacheKey]) {
                currentVerses = bibleCache[cacheKey];
                renderVerses(bookName, ch);
                if(!navigator.onLine) showToast('Loaded from offline cache', 'info');
                return;
            }

            if(!navigator.onLine) {
                reader.innerHTML = `
                    <div style="text-align:center; padding:40px;">
                        <i class="fas fa-wifi" style="font-size:40px; color:var(--accent-red); margin-bottom:15px;"></i>
                        <h3>You are Offline</h3>
                        <p>This chapter hasn't been downloaded yet. Connect to the internet to read it.</p>
                    </div>`;
                return;
            }

            // 2. Fetch from API
            try {
                let data =[];
                if(['NIV', 'MSG', 'NLT', 'ESV', 'KJV'].includes(currentVersion)) {
                    const res = await fetch(`https://bolls.life/get-chapter/${currentVersion}/${bookId}/${ch}/`);
                    if(!res.ok) throw new Error("Bolls API Failed");
                    const rawData = await res.json();
                    data = rawData.map(v => ({ verse: v.verse, text: v.text }));
                } else {
                    const res = await fetch(`https://bible-api.com/${bookName}+${ch}?translation=${currentVersion.toLowerCase()}`);
                    if(!res.ok) throw new Error("Bible-API Failed");
                    const rawData = await res.json();
                    data = rawData.verses.map(v => ({ verse: v.verse, text: v.text }));
                }

                // Clean HTML tags and cache it
                currentVerses = data.map(v => ({ 
                    verse: v.verse, 
                    text: v.text.replace(/<(?:.|\n)*?>/gm, '').trim() 
                }));
                
                bibleCache[cacheKey] = currentVerses;
                try { localStorage.setItem('pd_bible_cache', JSON.stringify(bibleCache)); } catch(e) {} // Handle quota exceeded silently
                
                renderVerses(bookName, ch);

            } catch (e) {
                console.error(e);
                reader.innerHTML = `
                    <div style="text-align:center; padding:40px;">
                        <i class="fas fa-exclamation-triangle" style="font-size:40px; color:var(--accent-red); margin-bottom:15px;"></i>
                        <h3>Error fetching translation</h3>
                        <p>The server might be busy. Try another version or refresh.</p>
                        <button class="btn-modern" style="margin-top:15px;" onclick="fetchChapter()">Retry</button>
                    </div>`;
            }
        };

        function renderVerses(book, ch) {
            let html = `<div class="chapter-title">${book} ${ch}</div><div class="verses-container">`;
            
            currentVerses.forEach((v, i) => {
                const ref = `${book} ${ch}:${v.verse}`;
                let extraClasses = "";
                
                // Inject Local Data (Highlights & Notes)
                if(myHighlights[ref]) extraClasses += ` ${myHighlights[ref].color}`;
                if(myNotes[ref]) extraClasses += ` verse-has-note`;

                html += `<span class="verse-item${extraClasses}" id="v-${i}" onclick="selVerse(${i})"><span class="verse-num">${v.verse}</span>${v.text}</span> `;
            });
            html += "</div>";
            document.getElementById('bibleReader').innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // Set Audio metadata
            document.getElementById('audioRef').innerText = `${book} ${ch}`;
            document.getElementById('audioVer').innerText = `${currentVersion} Version`;
            document.getElementById('audioPlayer').style.display = 'flex';
        }

        window.navigateChapter = (dir) => {
            const cSel = document.getElementById('chapterSelect');
            let newCh = parseInt(cSel.value) + dir;
            if(newCh >= 1 && newCh <= cSel.options.length) {
                cSel.value = newCh;
                window.fetchChapter();
            } else {
                showToast(dir > 0 ? "End of book" : "Beginning of book", "info");
            }
        };

        // --- VERSE ACTIONS ---
        window.selVerse = (i) => {
            document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('selected'));
            document.getElementById(`v-${i}`).classList.add('selected');
            selectedVerseIdx = i;
            document.getElementById('actionBar').classList.add('visible');
        };

        function hideActionBar() {
            document.getElementById('actionBar').classList.remove('visible');
            selectedVerseIdx = null;
            document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('selected'));
        }

        window.copyVerse = () => {
            if(selectedVerseIdx === null) return;
            const v = currentVerses[selectedVerseIdx];
            const bookName = bibleBooks[parseInt(document.getElementById('bookSelect').value)].name;
            const chapter = document.getElementById('chapterSelect').value;
            
            navigator.clipboard.writeText(`"${v.text}" - ${bookName} ${chapter}:${v.verse} (${currentVersion})`);
            showToast("Verse copied!");
            hideActionBar();
        };

        // --- FIREBASE SYNC: HIGHLIGHTS, NOTES, FAVORITES ---
        async function loadUserData() {
            if(!currentUser || !navigator.onLine) return; // Use localStorage if offline
            try {
                // Parallel fetching
                const[hlSnap, ntSnap, fvSnap] = await Promise.all([
                    getDocs(query(collection(db, "userHighlights"), where("userId", "==", currentUser.uid))),
                    getDocs(query(collection(db, "userNotes"), where("userId", "==", currentUser.uid))),
                    getDocs(query(collection(db, "userFavorites"), where("userId", "==", currentUser.uid)))
                ]);
                
                myHighlights = {}; myNotes = {}; myFavorites = {}; // Reset before filling
                
                hlSnap.forEach(d => { myHighlights[d.data().reference] = { id: d.id, color: d.data().color, text: d.data().text }; });
                ntSnap.forEach(d => { myNotes[d.data().reference] = { id: d.id, note: d.data().note, text: d.data().text }; });
                fvSnap.forEach(d => { myFavorites[d.data().reference] = { id: d.id, text: d.data().text }; });
                
                // Save fresh to local storage for offline use
                localStorage.setItem('pd_highlights', JSON.stringify(myHighlights));
                localStorage.setItem('pd_notes', JSON.stringify(myNotes));
                localStorage.setItem('pd_favorites', JSON.stringify(myFavorites));

                // Re-render if reading
                if(currentVerses.length > 0 && document.getElementById('tab-read').classList.contains('active')) {
                    const bIdx = parseInt(document.getElementById('bookSelect').value);
                    renderVerses(bibleBooks[bIdx].name, document.getElementById('chapterSelect').value);
                }
            } catch(e) { console.error("Error loading user data", e); }
        }

        window.highlight = async (colorClass) => {
            if(selectedVerseIdx === null) return;
            
            const v = currentVerses[selectedVerseIdx];
            const bookName = bibleBooks[parseInt(document.getElementById('bookSelect').value)].name;
            const chapter = document.getElementById('chapterSelect').value;
            const ref = `${bookName} ${chapter}:${v.verse}`;

            // Save locally first for instant feedback
            let docId = myHighlights[ref] ? myHighlights[ref].id : (currentUser ? doc(collection(db, "userHighlights")).id : 'local_'+Date.now());
            myHighlights[ref] = { id: docId, color: colorClass, text: v.text };
            localStorage.setItem('pd_highlights', JSON.stringify(myHighlights));
            
            const verseEl = document.getElementById(`v-${selectedVerseIdx}`);
            verseEl.className = `verse-item selected ${colorClass}`;
            if(myNotes[ref]) verseEl.classList.add('verse-has-note');
            hideActionBar();
            
            // Sync to Firebase if logged in & online
            if(currentUser && navigator.onLine) {
                try {
                    await setDoc(doc(db, "userHighlights", docId), {
                        userId: currentUser.uid, reference: ref, text: v.text, color: colorClass, savedAt: serverTimestamp()
                    });
                } catch(e) { console.error("Firebase save failed", e); }
            } else if (!currentUser) {
                showToast('Highlight saved to device. Sign in to backup to cloud.', 'info');
            }
        };

        window.removeHighlight = async () => {
            if(selectedVerseIdx === null) return;
            const v = currentVerses[selectedVerseIdx];
            const bookName = bibleBooks[parseInt(document.getElementById('bookSelect').value)].name;
            const ref = `${bookName} ${document.getElementById('chapterSelect').value}:${v.verse}`;

            if(myHighlights[ref]) {
                const docId = myHighlights[ref].id;
                delete myHighlights[ref];
                localStorage.setItem('pd_highlights', JSON.stringify(myHighlights));
                
                const el = document.getElementById(`v-${selectedVerseIdx}`);
                el.className = `verse-item selected ${myNotes[ref] ? 'verse-has-note' : ''}`;
                hideActionBar();

                if(currentUser && navigator.onLine && !docId.startsWith('local_')) {
                    try { await deleteDoc(doc(db, "userHighlights", docId)); } catch(e){}
                }
            }
        };

        window.openNoteModal = () => {
            if(selectedVerseIdx === null) return;
            const v = currentVerses[selectedVerseIdx];
            const bookName = bibleBooks[parseInt(document.getElementById('bookSelect').value)].name;
            const ref = `${bookName} ${document.getElementById('chapterSelect').value}:${v.verse}`;

            document.getElementById('noteReference').innerText = ref;
            document.getElementById('noteVerseText').innerText = `"${v.text}"`;
            document.getElementById('noteInput').value = myNotes[ref] ? myNotes[ref].note : "";
            
            document.getElementById('noteModal').style.display = 'flex';
            hideActionBar();
        };

        window.saveNote = async () => {
            const ref = document.getElementById('noteReference').innerText;
            const text = document.getElementById('noteVerseText').innerText.replace(/"/g, '');
            const noteContent = document.getElementById('noteInput').value;

            if(!noteContent.trim()) return showToast('Note is empty', 'error');

            let docId = myNotes[ref] ? myNotes[ref].id : (currentUser ? doc(collection(db, "userNotes")).id : 'local_'+Date.now());
            
            // Save locally
            myNotes[ref] = { id: docId, note: noteContent, text: text };
            localStorage.setItem('pd_notes', JSON.stringify(myNotes));
            
            document.getElementById('noteModal').style.display = 'none';
            showToast('Note saved!');
            
            // Render icon
            const bIdx = parseInt(document.getElementById('bookSelect').value);
            renderVerses(bibleBooks[bIdx].name, document.getElementById('chapterSelect').value);

            // Sync to Firebase
            if(currentUser && navigator.onLine) {
                try {
                    await setDoc(doc(db, "userNotes", docId), {
                        userId: currentUser.uid, reference: ref, text: text, note: noteContent, savedAt: serverTimestamp()
                    });
                } catch(e){}
            } else if (!currentUser) {
                showToast('Note saved to device. Sign in to backup.', 'info');
            }
        };

        window.saveFavorite = async () => {
            if(selectedVerseIdx === null) return;
            
            const v = currentVerses[selectedVerseIdx];
            const bookName = bibleBooks[parseInt(document.getElementById('bookSelect').value)].name;
            const ref = `${bookName} ${document.getElementById('chapterSelect').value}:${v.verse}`;

            if(myFavorites[ref]) return showToast('Already in favorites', 'info');

            let docId = currentUser ? doc(collection(db, "userFavorites")).id : 'local_'+Date.now();
            
            myFavorites[ref] = { id: docId, text: v.text };
            localStorage.setItem('pd_favorites', JSON.stringify(myFavorites));
            
            showToast(`⭐ ${ref} saved!`);
            confetti({ particleCount: 50, spread: 60 });
            hideActionBar();

            if(currentUser && navigator.onLine) {
                try {
                    await setDoc(doc(db, "userFavorites", docId), {
                        userId: currentUser.uid, reference: ref, text: v.text, version: currentVersion, savedAt: serverTimestamp()
                    });
                } catch(e){}
            } else if (!currentUser) {
                showToast('Favorite saved locally. Sign in to backup.', 'info');
            }
        };

        // --- NOTEBOOK TAB RENDERING ---
        window.switchTab = (tabName) => {
            document.querySelectorAll('.app-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');

            if(tabName === 'notebook') showNotebookSection('highlights');
        };

        window.showNotebookSection = (type) => {
            document.querySelectorAll('#tab-notebook .version-btn').forEach(b => b.classList.remove('active'));
            const container = document.getElementById('notebookList');

            let dataObj = {};
            if(type === 'highlights') { document.getElementById('nb-hl-btn').classList.add('active'); dataObj = myHighlights; } 
            else if (type === 'notes') { document.getElementById('nb-nt-btn').classList.add('active'); dataObj = myNotes; } 
            else { document.getElementById('nb-fv-btn').classList.add('active'); dataObj = myFavorites; }

            const keys = Object.keys(dataObj);
            if(keys.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 40px; color:var(--text-secondary);">No ${type} saved yet.</div>`;
                return;
            }

            container.innerHTML = keys.map(ref => {
                const item = dataObj[ref];
                let extraContent = '';
                let bgClass = '';
                
                if(type === 'highlights') bgClass = item.color;
                else if(type === 'notes') extraContent = `<div class="note-block">${item.note}</div>`;

                return `
                    <div class="notebook-item ${bgClass}">
                        <div style="flex:1;">
                            <h4 onclick="jumpToVerse('${ref}')"><i class="fas fa-link"></i> ${ref}</h4>
                            <p>"${item.text}"</p>
                            ${extraContent}
                        </div>
                        <button onclick="deleteNbItem('${type}', '${ref}', '${item.id}')" style="background:none; border:none; color:var(--text-sub); cursor:pointer; padding:5px;"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            }).join('');
        };

        window.jumpToVerse = (ref) => {
            const match = ref.match(/^(.+?)\s+(\d+):(\d+)$/);
            if(match) {
                const book = match[1];
                const ch = match[2];
                const verse = parseInt(match[3]);
                
                const bIdx = bibleBooks.findIndex(b => b.name === book);
                if(bIdx !== -1) {
                    document.getElementById('bookSelect').value = bIdx;
                    updateChapters();
                    document.getElementById('chapterSelect').value = ch;
                    
                    document.querySelector('.app-tab').click(); // Switch to read tab
                    
                    window.fetchChapter().then(() => {
                        setTimeout(() => {
                            const vIdx = currentVerses.findIndex(v => parseInt(v.verse) === verse);
                            if(vIdx !== -1) {
                                selVerse(vIdx);
                                document.getElementById(`v-${vIdx}`).scrollIntoView({behavior: 'smooth', block:'center'});
                            }
                        }, 500);
                    });
                }
            }
        };

        window.deleteNbItem = async (type, ref, id) => {
            if(!confirm(`Delete this item?`)) return;
            
            let collectionName = type === 'highlights' ? 'userHighlights' : (type === 'notes' ? 'userNotes' : 'userFavorites');
            
            // Delete locally
            if(type === 'highlights') { delete myHighlights[ref]; localStorage.setItem('pd_highlights', JSON.stringify(myHighlights)); }
            if(type === 'notes') { delete myNotes[ref]; localStorage.setItem('pd_notes', JSON.stringify(myNotes)); }
            if(type === 'favorites') { delete myFavorites[ref]; localStorage.setItem('pd_favorites', JSON.stringify(myFavorites)); }
            
            showNotebookSection(type);
            showToast('Deleted successfully');

            // Delete from Firebase
            if(currentUser && navigator.onLine && !id.startsWith('local_')) {
                try { await deleteDoc(doc(db, collectionName, id)); } catch(e){}
            }
        };

        // --- SEARCH SCRIPTURES ---
        window.searchBible = async () => {
            const queryStr = document.getElementById('searchInput').value.trim();
            if(!queryStr || queryStr.length < 3) return showToast('Enter at least 3 characters', 'error');

            if(!navigator.onLine) return showToast('Search requires an internet connection.', 'error');

            const container = document.getElementById('searchResults');
            container.innerHTML = '<div style="text-align:center; padding:40px;"><div class="loading-spinner"></div></div>';

            try {
                // Using Bible-API for fast search across all books (WEB version default for search)
                const res = await fetch(`https://bible-api.com/${encodeURIComponent(queryStr)}`);
                const data = await res.json();

                if(!data.verses || data.verses.length === 0) throw new Error("No results");

                container.innerHTML = `<h4 style="color:var(--accent-green); margin-bottom:15px;">Found ${data.verses.length} results:</h4>` + 
                data.verses.map(item => `
                    <div class="notebook-item" style="cursor:pointer;" onclick="jumpToVerse('${item.book_name} ${item.chapter}:${item.verse}')">
                        <div>
                            <h4 style="margin-bottom:5px;"><i class="fas fa-link"></i> ${item.book_name} ${item.chapter}:${item.verse}</h4>
                            <p style="font-size:0.9rem; color:var(--text-primary); margin:0;">${item.text.trim()}</p>
                        </div>
                    </div>
                `).join('');

            } catch(e) {
                container.innerHTML = `<div style="text-align:center; padding: 40px; color:var(--text-sub);">No results found. Try searching a specific reference like "John 3:16" or a clear keyword.</div>`;
            }
        };

        // --- MALE / FEMALE ADVANCED AUDIO PLAYER (TTS) ---
        let speech = window.speechSynthesis;
        let isReading = false;
        let readIdx = -1; // -1 represents the intro message

        function initVoices() {
            const populate = () => {
                const voices = speech.getVoices();
                const sel = document.getElementById('voiceSelect');
                sel.innerHTML = '<option value="">Default Voice</option>';
                
                voices.forEach((v, i) => {
                    if(v.lang.includes('en')) {
                        let label = v.name.replace('Microsoft ', '').replace('Google ', '');
                        
                        // Try to guess gender based on common TTS voice names
                        if(/zira|samantha|victoria|female|karen|moira|tessa|susan/i.test(v.name)) {
                            label += ' (Female)';
                        } else if(/david|alex|daniel|male|fred|mark|tom/i.test(v.name)) {
                            label += ' (Male)';
                        }

                        sel.innerHTML += `<option value="${i}">${label}</option>`;
                    }
                });
            };

            speech.onvoiceschanged = populate;
            populate(); // Call in case they are already loaded
        }

        window.startAudioFromSelected = () => {
            if(selectedVerseIdx !== null) {
                readIdx = selectedVerseIdx;
                document.getElementById('actionBar').classList.remove('visible');
                playAudio();
            }
        };

        window.toggleAudio = () => {
            if(isReading) { 
                speech.pause(); 
                isReading = false; 
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>';
            } else { 
                if(speech.paused && currentVerses.length > 0 && readIdx > -1) {
                    speech.resume(); 
                } else { 
                    if(readIdx < -1) readIdx = -1;
                    playAudio(); 
                }
                isReading = true;
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
            }
        };

        window.stopAudio = () => { 
            speech.cancel(); 
            isReading = false;
            readIdx = -1; // Reset to intro on stop
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>'; 
            document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('reading'));
        };

        window.audioSkip = (dir) => {
            if(!currentVerses.length) return;
            readIdx += dir;
            
            if(readIdx < -1) readIdx = -1;
            if(readIdx > currentVerses.length) { stopAudio(); return; }
            
            playAudio();
        };

        function playAudio() {
            speech.cancel(); // Stop current speech
            
            let textToSpeak = "";
            let isVerse = false;

            const bookName = bibleBooks[parseInt(document.getElementById('bookSelect').value)].name;
            const chapter = document.getElementById('chapterSelect').value;

            if (readIdx === -1) {
                textToSpeak = `Welcome to Prayer Dome Bible. ${bookName} chapter ${chapter}.`;
            } else if (readIdx >= currentVerses.length) {
                textToSpeak = "Thank you.";
            } else {
                textToSpeak = currentVerses[readIdx].cleanText;
                isVerse = true;
            }
            
            const utter = new SpeechSynthesisUtterance(textToSpeak);
            
            // Apply voice settings
            const voiceIdx = document.getElementById('voiceSelect').value;
            if(voiceIdx) utter.voice = speech.getVoices()[voiceIdx];
            utter.rate = parseFloat(document.getElementById('audioSpeed').value || 1);

            // Handle highlighting
            document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('reading'));
            if (isVerse) {
                const el = document.getElementById(`v-${readIdx}`);
                if(el) {
                    el.classList.add('reading');
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }

            // Events
            utter.onend = () => { 
                readIdx++; 
                if (readIdx > currentVerses.length) {
                    stopAudio(); // Reached past the outro
                } else if(isReading) {
                    playAudio(); 
                }
            };

            utter.onerror = (e) => {
                console.error("TTS Error", e);
                isReading = false;
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>';
            };

            isReading = true;
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
            speech.speak(utter);
        }

        // --- CLOUDINARY VERSE IMAGE GENERATOR ---
        const bgImages =[
            'https://images.unsplash.com/photo-1507692049790-de58290a4334?w=800&q=80', 
            'https://images.unsplash.com/photo-1495304265430-8025816997cb?w=800&q=80',
            'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=800&q=80',
            'https://images.unsplash.com/photo-1437433105546-cb11b42ce448?w=800&q=80'
        ];
        let currentBgIndex = 0;

        window.openCanvasModal = () => {
            if(selectedVerseIdx === null) return;
            document.getElementById('canvasModal').style.display = 'flex';
            document.getElementById('actionBar').classList.remove('visible');
            drawCanvas();
        };

        window.changeCanvasBackground = () => {
            currentBgIndex = (currentBgIndex + 1) % bgImages.length;
            drawCanvas();
        };

        function drawCanvas() {
            const canvas = document.getElementById('verseCanvas');
            const ctx = canvas.getContext('2d');
            const v = currentVerses[selectedVerseIdx];
            const bookName = bibleBooks[parseInt(document.getElementById('bookSelect').value)].name;
            const chapter = document.getElementById('chapterSelect').value;
            const ref = `${bookName} ${chapter}:${v.verse} ${currentVersion.toUpperCase()}`;
            
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = bgImages[currentBgIndex];
            
            img.onload = () => {
                ctx.drawImage(img, 0, 0, 800, 800);
                
                // Dark overlay
                ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
                ctx.fillRect(0, 0, 800, 800);

                ctx.fillStyle = "#ffffff";
                ctx.textAlign = "center";
                
                // Verse Text
                ctx.font = "bold 38px 'Georgia'";
                wrapText(ctx, `"${v.cleanText}"`, 400, 320, 650, 50);

                // Reference
                ctx.font = "italic 28px 'Inter'";
                ctx.fillStyle = "#d4af37"; 
                ctx.fillText(`- ${ref}`, 400, 650);

                // Branding
                ctx.font = "20px 'Inter'";
                ctx.fillStyle = "rgba(255,255,255,0.7)";
                ctx.fillText("Prayer Dome Ministry", 400, 750);
            };
        }

        function wrapText(context, text, x, y, maxWidth, lineHeight) {
            const words = text.split(' ');
            let line = '';
            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                let metrics = context.measureText(testLine);
                if (metrics.width > maxWidth && n > 0) {
                    context.fillText(line, x, y);
                    line = words[n] + ' ';
                    y += lineHeight;
                } else { line = testLine; }
            }
            context.fillText(line, x, y);
        }

        window.uploadToCloudinary = () => {
            if(!navigator.onLine) {
                // If offline, just download locally
                const canvas = document.getElementById('verseCanvas');
                const link = document.createElement('a');
                link.download = 'prayer-dome-verse.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
                showToast('Downloaded locally (Offline mode)', 'info');
                document.getElementById('canvasModal').style.display = 'none';
                return;
            }

            const canvas = document.getElementById('verseCanvas');
            const dataURL = canvas.toDataURL('image/jpeg', 0.9);
            
            const btn = document.getElementById('uploadImgBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;

            const formData = new FormData();
            formData.append('file', dataURL);
            formData.append('upload_preset', 'gallery_uploads'); // Ensure this exists and is unsigned

            fetch('https://api.cloudinary.com/v1_1/prayerdome/image/upload', {
                method: 'POST', body: formData
            })
            .then(res => res.json())
            .then(data => {
                if(data.secure_url) {
                    showToast('Image generated & uploaded successfully!', 'success');
                    // Auto-download
                    const link = document.createElement('a');
                    link.download = 'prayer-dome-verse.jpg';
                    link.href = data.secure_url;
                    link.click();
                    document.getElementById('canvasModal').style.display = 'none';
                } else throw new Error(data.error.message || "Unknown upload error");
            })
            .catch(err => {
                // Fallback to local download if upload fails
                const link = document.createElement('a');
                link.download = 'prayer-dome-verse.jpg';
                link.href = dataURL;
                link.click();
                showToast('Downloaded locally (Upload failed)', 'info');
                document.getElementById('canvasModal').style.display = 'none';
            })
            .finally(() => {
                btn.innerHTML = '<i class="fas fa-share-alt"></i> Share & Save';
                btn.disabled = false;
            });
        };

        // --- UTILITIES ---
        window.showToast = (msg, type='success') => {
            const cont = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-info-circle'}"></i> <span>${msg}</span>`;
            cont.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
        };

        window.toggleDarkMode = () => { document.body.classList.toggle('dark-mode'); };

    </script>
</body>
</html>
