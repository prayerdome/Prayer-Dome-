<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer Dome | Global Membership</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        :root {
            --accent-green: #15803d;
            --accent-gold: #d4af37;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --border: #e2e8f0;
        }

        body.dark-mode {
            --bg-primary: #020617; --bg-card: #0f172a; --text-main: #f8fafc; --border: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-primary); color: var(--text-main); transition: 0.3s; padding-bottom: 50px; }

        /* --- UI COMPONENTS --- */
        .auth-header { background: var(--bg-card); padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo-ring { width: 45px; height: 45px; background: linear-gradient(135deg, var(--accent-green), var(--accent-gold)); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 22px; }

        .container { max-width: 700px; margin: 30px auto; padding: 0 20px; }
        .auth-card { background: var(--bg-card); border-radius: 32px; padding: 40px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .tabs { display: flex; background: var(--bg-primary); padding: 5px; border-radius: 50px; margin-bottom: 30px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 50px; font-weight: 700; transition: 0.3s; color: var(--text-main); opacity: 0.5; }
        .tab.active { background: var(--bg-card); box-shadow: 0 4px 10px rgba(0,0,0,0.1); opacity: 1; color: var(--accent-green); }

        /* --- FORM STYLES --- */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.85rem; }
        input, select, textarea { width: 100%; padding: 14px 18px; border-radius: 16px; border: 2px solid var(--border); background: var(--bg-primary); color: var(--text-main); outline: none; font-size: 0.95rem; }
        input:focus { border-color: var(--accent-green); }
        .full-width { grid-column: span 2; }

        .btn { padding: 15px 30px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; justify-content: center; width: 100%; }
        .btn-primary { background: var(--accent-green); color: white; }
        .btn-google { background: white; border: 2px solid var(--border); color: var(--text-main); }
        .btn-outline { background: transparent; border: 2px solid var(--border); }

        /* --- PROFILE VIEW --- */
        .profile-hero { text-align: center; margin-bottom: 30px; }
        .avatar-frame { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--accent-gold); padding: 5px; margin: 0 auto 15px; position: relative; }
        .avatar-frame img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .membership-badge { background: linear-gradient(135deg, var(--accent-green), #064e3b); color: white; padding: 10px 20px; border-radius: 20px; margin: 15px 0; font-weight: 800; display: inline-block; font-family: monospace; letter-spacing: 1px; }

        .profile-stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 25px 0; }
        .stat-item { background: var(--bg-primary); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--border); }

        /* --- TOAST --- */
        .toast-box { position: fixed; top: 20px; right: 20px; z-index: 2000; }
        .toast { background: var(--bg-card); padding: 15px 25px; border-radius: 40px; margin-bottom: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-left: 5px solid var(--accent-green); animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 12px; font-weight: 600; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .age-warning { color: #ef4444; font-size: 0.75rem; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="toast-box" id="toastContainer"></div>

    <header class="auth-header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="logo-ring"><i class="fas fa-dove"></i></div>
            <h1 style="font-size: 1.2rem; font-weight: 900; letter-spacing: -0.5px;">Prayer Dominion</h1>
        </div>
        <button onclick="toggleDarkMode()" style="background:none; border:none; color:inherit; font-size: 1.4rem; cursor:pointer;"><i class="fas fa-moon"></i></button>
    </header>

    <div class="container">
        
        <div id="authTabs" class="tabs">
            <div class="tab active" onclick="switchTab('login')">SIGN IN</div>
            <div class="tab" onclick="switchTab('register')">REGISTER</div>
        </div>

        <!-- LOGIN SCREEN -->
        <div id="loginForm" class="auth-card">
            <h2 style="margin-bottom: 30px; text-align: center;">Welcome Home</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="lEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="lPass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary">Sign In <i class="fas fa-arrow-right"></i></button>
            </form>
            <div style="text-align: center; margin: 25px 0; color: var(--text-sub); font-size: 0.8rem; font-weight: 700;">OR CONTINUE WITH</div>
            <button class="btn btn-google" onclick="handleGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20"> Google Account
            </button>
        </div>

        <!-- REGISTRATION SCREEN -->
        <div id="registerForm" class="auth-card" style="display: none;">
            <h2 style="margin-bottom: 25px; text-align: center;">Join the Family</h2>
            
            <div class="profile-photo-container">
                <div class="avatar-frame"><img id="regPreview" src="https://via.placeholder.com/150"></div>
                <button onclick="uploadPhoto()" class="btn btn-outline" style="width: auto; padding: 6px 15px; font-size: 11px;">Upload Portrait</button>
                <input type="hidden" id="uploadedPhoto">
            </div>

            <form onsubmit="handleRegister(event)">
                <div class="form-grid">
                    <div class="form-group full-width"><label>Full Name</label><input type="text" id="rName" required></div>
                    <div class="form-group"><label>Email Address</label><input type="email" id="rEmail" required></div>
                    <div class="form-group"><label>Phone Number</label><input type="tel" id="rPhone" required></div>
                    
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" id="rDob" onchange="checkAge(this.value)" required>
                        <p id="ageWarn" class="age-warning">Access Denied: Must be 13+ years old.</p>
                    </div>

                    <div class="form-group">
                        <label>Your Branch</label>
                        <select id="rBranch">
                            <option value="Chama, Zambia">Zambia - Chama</option>
                            <option value="Manzini, Eswatini">Eswatini - Manzini</option>
                            <option value="Cork, Ireland">Ireland - Cork</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Role in Church</label>
                        <select id="rRole">
                            <option value="Member">Church Member</option>
                            <option value="Pastor">Pastor / Leader</option>
                            <option value="Visitor">Visitor / Global Guest</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Where did you hear about us?</label>
                        <select id="rReferral">
                            <option value="Social Media">Social Media</option>
                            <option value="Friend">Friend / Family</option>
                            <option value="Radio">Radio / TV</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group"><label>Password</label><input type="password" id="rPass" minlength="6" required></div>
                    <div class="form-group"><label>Confirm Password</label><input type="password" id="rConfirm" required></div>
                </div>
                <button type="submit" id="regBtn" class="btn btn-primary">Establish Membership <i class="fas fa-shield-check"></i></button>
            </form>
        </div>

        <!-- PROFILE MANAGEMENT SCREEN -->
        <div id="profileSection" class="auth-card" style="display: none;">
            
            <!-- VIEW MODE -->
            <div id="profileView">
                <div class="profile-hero">
                    <div class="avatar-frame"><img id="pPhoto" src=""></div>
                    <h2 id="pNameDisplay">User Name</h2>
                    <p id="pRoleDisplay" style="color: var(--accent-gold); font-weight: 800; font-size: 0.8rem;"></p>
                    
                    <div class="membership-badge">
                        <span style="display: block; font-size: 10px; opacity: 0.7;">MEMBERSHIP ID</span>
                        <span id="pIdDisplay">none</span>
                    </div>
                </div>

                <div class="stat-box" style="margin-bottom: 20px; text-align: left; background: var(--bg-primary); padding: 20px; border-radius: 20px;">
                    <label style="font-size: 11px; font-weight: 800; opacity: 0.6;">SPIRITUAL BIO</label>
                    <p id="pBioDisplay" style="font-size: 0.9rem; margin-top: 5px;">No bio added yet.</p>
                </div>

                <div class="profile-stat-grid">
                    <div class="stat-item"><div class="stat-number" id="pPrayers">0</div><div style="font-size: 9px;">PRAYERS</div></div>
                    <div class="stat-item"><div class="stat-number" id="pBranch">Zambia</div><div style="font-size: 9px;">BRANCH</div></div>
                    <div class="stat-item"><div class="stat-number" id="pWallet">E0</div><div style="font-size: 9px;">WALLET</div></div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button onclick="toggleEdit(true)" class="btn btn-primary" style="flex: 2;">Edit Profile <i class="fas fa-pen"></i></button>
                    <button onclick="handleLogout()" class="btn btn-outline" style="flex: 1; color: #ef4444;"><i class="fas fa-power-off"></i></button>
                </div>
            </div>

            <!-- EDIT MODE -->
            <div id="profileEdit" style="display: none;">
                <h3 style="margin-bottom: 20px; color: var(--accent-green);">Update Information</h3>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="eName">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select id="eGender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Private">Prefer not to say</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Spiritual Bio</label>
                    <textarea id="eBio" rows="3" placeholder="Tell us about your faith journey..."></textarea>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="ePhone">
                </div>
                <div class="form-group">
                    <label>Interests / Ministry Passions</label>
                    <input type="text" id="eInterests" placeholder="e.g. Worship, Outreach, Bible Study">
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button onclick="saveProfile()" class="btn btn-primary" style="flex: 2;">Save Everything</button>
                    <button onclick="toggleEdit(false)" class="btn btn-outline" style="flex: 1;">Cancel</button>
                </div>
            </div>

        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, GoogleAuthProvider, signInWithPopup, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxvql0r_aeerphxTA0UUedRppdBxGf7wo",
            authDomain: "prayer-dome.firebaseapp.com",
            projectId: "prayer-dome",
            storageBucket: "prayer-dome.firebasestorage.app",
            messagingSenderId: "198295153196",
            appId: "1:198295153196:web:1222b31948d7974ba3bf89"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        // --- AUTH OBSERVER ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('authTabs').style.display = 'none';
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('profileSection').style.display = 'block';
                await loadProfileData(user);
            } else {
                document.getElementById('authTabs').style.display = 'flex';
                document.getElementById('profileSection').style.display = 'none';
                switchTab('login');
            }
        });

        // --- CORE FUNCTIONS ---

        window.handleRegister = async (e) => {
            e.preventDefault();
            const dob = document.getElementById('rDob').value;
            if(calculateAge(dob) < 13) return;

            const name = document.getElementById('rName').value;
            const email = document.getElementById('rEmail').value;
            const pass = document.getElementById('rPass').value;
            const branch = document.getElementById('rBranch').value;
            const photo = document.getElementById('uploadedPhoto').value;

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(cred.user, { displayName: name, photoURL: photo });
                await sendEmailVerification(cred.user);

                await setDoc(doc(db, "users", cred.user.uid), {
                    fullName: name,
                    email: email,
                    phone: document.getElementById('rPhone').value,
                    dob: dob,
                    branch: branch,
                    role: document.getElementById('rRole').value,
                    referral: document.getElementById('rReferral').value,
                    photoURL: photo,
                    bio: "",
                    interests: "",
                    gender: "",
                    prayerCount: 0,
                    walletBalance: 0,
                    createdAt: serverTimestamp()
                });

                confetti();
                speak(`Thank you for registering to Prayer Dominion ${branch}. God bless you.`);
                showToast("Welcome to the Family!", "success");

            } catch (e) { showToast(e.message, "error"); }
        };

        window.handleLogin = async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('lEmail').value, document.getElementById('lPass').value);
                showToast("Welcome back!", "success");
            } catch (e) { showToast("Invalid Credentials", "error"); }
        };

        window.handleGoogle = async () => {
            try {
                const res = await signInWithPopup(auth, googleProvider);
                const userDoc = await getDoc(doc(db, "users", res.user.uid));
                if (!userDoc.exists()) {
                    await setDoc(doc(db, "users", res.user.uid), {
                        fullName: res.user.displayName,
                        email: res.user.email,
                        photoURL: res.user.photoURL,
                        branch: "Global",
                        walletBalance: 0,
                        createdAt: serverTimestamp()
                    });
                }
            } catch (e) { showToast(e.message, "error"); }
        };

        async function loadProfileData(user) {
            const userSnap = await getDoc(doc(db, "users", user.uid));
            const memberSnap = await getDoc(doc(db, "memberships", user.uid));

            if (userSnap.exists()) {
                const data = userSnap.data();
                document.getElementById('pNameDisplay').innerText = data.fullName;
                document.getElementById('pRoleDisplay').innerText = data.role?.toUpperCase() || "MEMBER";
                document.getElementById('pBioDisplay').innerText = data.bio || "No spiritual bio added yet.";
                document.getElementById('pPhoto').src = data.photoURL || "https://via.placeholder.com/150";
                document.getElementById('pPrayers').innerText = data.prayerCount || 0;
                document.getElementById('pBranch').innerText = data.branch?.split(',')[0] || "Zambia";
                document.getElementById('pWallet').innerText = "E" + (data.walletBalance || 0);

                // Edit form defaults
                document.getElementById('eName').value = data.fullName;
                document.getElementById('ePhone').value = data.phone || "";
                document.getElementById('eGender').value = data.gender || "Male";
                document.getElementById('eBio').value = data.bio || "";
                document.getElementById('eInterests').value = data.interests || "";
            }

            document.getElementById('pIdDisplay').innerText = memberSnap.exists() ? memberSnap.data().membershipId : "none";
        }

        window.saveProfile = async () => {
            const updates = {
                fullName: document.getElementById('eName').value,
                phone: document.getElementById('ePhone').value,
                gender: document.getElementById('eGender').value,
                bio: document.getElementById('eBio').value,
                interests: document.getElementById('eInterests').value
            };
            try {
                await updateDoc(doc(db, "users", auth.currentUser.uid), updates);
                await updateProfile(auth.currentUser, { displayName: updates.fullName });
                showToast("Profile Updated!", "success");
                toggleEdit(false);
                loadProfileData(auth.currentUser);
            } catch (e) { showToast(e.message, "error"); }
        };

        // --- LOGIC HELPERS ---

        window.checkAge = (val) => {
            const age = calculateAge(val);
            const btn = document.getElementById('regBtn');
            const warn = document.getElementById('ageWarn');
            if (age < 13) {
                btn.disabled = true;
                btn.style.opacity = "0.5";
                warn.style.display = "block";
            } else {
                btn.disabled = false;
                btn.style.opacity = "1";
                warn.style.display = "none";
            }
        };

        function calculateAge(birthday) {
            const ageDifMs = Date.now() - new Date(birthday).getTime();
            const ageDate = new Date(ageDifMs);
            return Math.abs(ageDate.getUTCFullYear() - 1970);
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 0.9;
            msg.pitch = 1.1;
            window.speechSynthesis.speak(msg);
        }

        window.uploadPhoto = () => {
            cloudinary.openUploadWidget({
                cloudName: 'prayerdome',
                uploadPreset: 'profile_photos',
                cropping: true
            }, (err, res) => {
                if (!err && res.event === "success") {
                    const url = res.info.secure_url;
                    document.getElementById('uploadedPhoto').value = url;
                    document.getElementById('regPreview').src = url;
                }
            });
        };

        window.switchTab = (type) => {
            document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = type === 'register' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (type === 'login' && i === 0) || (type === 'register' && i === 1)));
        };

        window.toggleEdit = (show) => {
            document.getElementById('profileView').style.display = show ? 'none' : 'block';
            document.getElementById('profileEdit').style.display = show ? 'block' : 'none';
        };

        window.toggleDarkMode = () => document.body.classList.toggle('dark-mode');
        window.handleLogout = () => signOut(auth);
        window.showToast = (msg, type) => {
            const t = document.createElement('div');
            t.className = `toast`;
            if(type === 'error') t.style.borderLeftColor = 'red';
            t.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 4000);
        };
    </script>
</body>
</html>
